# Site settings
title: Revolución Marrón
description: "Think Tank en Arquitectura Productiva Regenerativa"
url: "https://revolucionmarron.cl"
baseurl: ""

# Author information
author:
  name: Jaime Fernández López
  bio: "Ingeniero Agrónomo, M.Sc. Economía Agraria y Ambiental"
  email: jaime@revolucionmarron.cl

# Build settings
markdown: kramdown
permalink: /publicaciones/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Timezone and language
timezone: America/Santiago
lang: es

# SEO and Social Media
logo: /assets/images/logo-rm-social.png

twitter:
  card: summary_large_image

social:
  name: Revolución Marrón
  links:
    - https://www.linkedin.com/in/jaime-fernandez-l

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
